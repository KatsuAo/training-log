header{
  padding:26px 28px 18px;
  text-align:center;
}
header h1{
  font-family:'CinzelB',serif;
  font-size:clamp(26px,4.4vw,44px);
  letter-spacing:.14em;
  margin:0;
  color:var(--ice);
  text-shadow:0 2px 18px rgba(0,0,0,.45);
}
header .sub{
  font-family:'CinzelR',serif;
  color:var(--hl);
  letter-spacing:.28em;
  font-size:12px;
  margin-top:6px;
  text-transform:uppercase;
}
.themes{ display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
.themes button{
  width:34px; height:34px; border-radius:50%;
  border:2px solid rgba(255,255,255,.35); cursor:pointer;
  transition:transform .15s, box-shadow .15s;
}
.themes button.active{ transform:scale(1.18); box-shadow:0 0 0 3px var(--ice); }
.t-RED{ background:linear-gradient(135deg,#a01e0a,#340810); }
.t-BLUE{ background:linear-gradient(135deg,#0082af,#061034); }
.t-GREEN{ background:linear-gradient(135deg,#149137,#082810); }
.t-PURPLE{ background:linear-gradient(135deg,#6e12c3,#1e0a3a); }
.t-GOLD{ background:linear-gradient(135deg,#aa780a,#322406); }
.t-TEAL{ background:linear-gradient(135deg,#0a968c,#062c2a); }
.t-ORANGE{ background:linear-gradient(135deg,#b9550a,#371606); }
.t-PINK{ background:linear-gradient(135deg,#b91473,#340826); }
.t-MONO{ background:linear-gradient(135deg,#5f6673,#181a1e); }

main{
  display:grid;
  grid-template-columns:minmax(340px,540px) minmax(300px,1fr);
  gap:22px;
  padding:0 22px 40px;
  max-width:1240px;
  margin:0 auto;
  align-items:start;
}
@media (max-width:880px){ main{ grid-template-columns:1fr; } }

.panel{
  background:color-mix(in srgb, var(--panel) 78%, transparent);
  border:1px solid rgba(255,255,255,.16);
  border-radius:16px;
  padding:16px;
  backdrop-filter:blur(6px);
  box-shadow:0 10px 34px rgba(0,0,0,.35);
}
.panel + .panel{ margin-top:18px; }
.panel h2{
  font-family:'CinzelB',serif;
  font-size:15px; letter-spacing:.16em;
  margin:0 0 12px; color:var(--ice);
  border-bottom:1px solid rgba(255,255,255,.18);
  padding-bottom:8px;
}

.weeknav{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.weeknav input[type=date]{ flex:1; min-width:150px; }
.weeknav .range{
  font-family:'CinzelR',serif; letter-spacing:.06em;
  color:var(--hl); width:100%; margin-top:6px; font-size:15px;
}

input,select,button{ font:inherit; color:var(--ice); }
input,select{
  background:rgba(0,0,0,.32);
  border:1px solid rgba(255,255,255,.22);
  border-radius:8px;
  padding:7px 9px;
}
input:focus,select:focus,button:focus-visible{ outline:2px solid var(--hl); outline-offset:1px; }
input[disabled]{ opacity:.55; }
input[type=number]{ width:90px; }
button{
  background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.28);
  border-radius:9px;
  padding:8px 14px;
  cursor:pointer;
  transition:background .15s;
}
button:hover{ background:rgba(255,255,255,.12); }
button.primary{
  background:var(--hl); border-color:transparent; color:#fff;
  font-weight:600; letter-spacing:.04em;
}
button.primary:hover{ filter:brightness(1.12); }
button.icon{ padding:6px 10px; line-height:1; }

.day{
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px;
  padding:12px 12px 10px;
  margin-bottom:12px;
  background:color-mix(in srgb, var(--row) 60%, transparent);
}
.day .dayhead{
  display:flex; align-items:baseline; gap:10px; margin-bottom:10px;
}
.day .dayhead .dname{
  font-family:'CinzelB',serif; font-size:18px; letter-spacing:.1em;
}
.day .dayhead .ddate{ color:#9b8a55; font-family:'CinzelR',serif; }
.day .dayhead .restmark{
  margin-left:auto; font-size:11px; color:var(--ice); opacity:.55; letter-spacing:.12em;
}
.fieldrow{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:6px 0; }
.fieldrow .lbl{ width:52px; opacity:.85; flex-shrink:0; }
.srow{ display:flex; align-items:center; gap:8px; margin:5px 0 5px 60px; flex-wrap:wrap; }
.unit{ opacity:.7; }
.addbtn{ margin-left:60px; margin-top:2px; font-size:12px; padding:4px 10px; }

.diffgrid{ display:grid; grid-template-columns:auto 1fr; gap:8px 12px; align-items:center; }
.diffgrid label.autolbl{ display:flex; align-items:center; gap:6px; white-space:nowrap; }
.hint{ opacity:.65; font-size:12px; margin-top:8px; line-height:1.6; }

.io{ display:flex; gap:10px; flex-wrap:wrap; }
#preview-wrap{ text-align:center; }
#preview{
  width:100%; max-width:520px; height:auto;
  border-radius:14px;
  box-shadow:0 16px 44px rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.18);
}
#status{ min-height:18px; font-size:12px; opacity:.75; margin:8px 0; }
.savebar{ display:flex; gap:10px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
</style>
</head>
<body>
<header>
  <h1>TRAINING LOG STUDIO</h1>
  <div class="sub">Weekly Summary Generator</div>
  <div class="themes" role="group" aria-label="カラーテーマ">
    <button class="t-RED" data-theme="RED" title="RED" aria-label="赤テーマ"></button>
    <button class="t-BLUE" data-theme="BLUE" title="BLUE" aria-label="青テーマ"></button>
    <button class="t-GREEN" data-theme="GREEN" title="GREEN" aria-label="緑テーマ"></button>
    <button class="t-PURPLE" data-theme="PURPLE" title="PURPLE" aria-label="紫テーマ"></button>
    <button class="t-GOLD" data-theme="GOLD" title="GOLD" aria-label="ゴールドテーマ"></button>
    <button class="t-TEAL" data-theme="TEAL" title="TEAL" aria-label="ティールテーマ"></button>
    <button class="t-ORANGE" data-theme="ORANGE" title="ORANGE" aria-label="オレンジテーマ"></button>
    <button class="t-PINK" data-theme="PINK" title="PINK" aria-label="ピンクテーマ"></button>
    <button class="t-MONO" data-theme="MONO" title="MONO" aria-label="モノトーンテーマ"></button>
  </div>
</header>

<main>
  <div><!-- ===== left: console ===== -->
    <section class="panel">
      <h2>WEEK</h2>
      <div class="weeknav">
        <button id="prevWeek" class="icon" title="前の週">◀</button>
        <input type="date" id="weekDate" aria-label="週内の任意の日付">
        <button id="nextWeek" class="icon" title="次の週">▶</button>
        <button id="thisWeek">今週</button>
        <div class="range" id="weekRange"></div>
      </div>
    </section>

    <section class="panel">
      <h2>INPUT</h2>
      <div id="days"></div>
    </section>

    <section class="panel">
      <h2>先週比（差分表示）</h2>
      <div class="diffgrid">
        <label class="autolbl"><input type="checkbox" id="autoLoad" checked>筋トレ 自動</label>
        <span><input type="number" id="lastLoad" step="1" min="0"> <span class="unit">kg</span></span>

        let line = words[0];

      shoulderFibers('lsh',13,53); shoulderFibers('rsh',67,53);

      P([[5,48],[18,50],[16,95],[5,92]], hi('lbic'));
      P([[62,50],[75,48],[75,92],[64,95]], hi('rbic'));
      fibers('lbic',[[[6,60],[17,60]],[[6,70],[17,70]],[[6,80],[17,80]]]);
      fibers('rbic',[[[63,60],[74,60]],[[63,70],[74,70]],[[63,80],[74,80]]]);

      P([[28,90],[52,90],[50,110],[30,110]], MID);

      { const a=px(40,90), b=px(40,110);
        line(ctx, a[0],a[1],b[0],b[1], BONE, Math.max(1,Math.floor(sc*0.9))); }

      P([[18,110],[62,110],[60,124],[20,124]], hi('hips'));

      P([[20,124],[32,124],[31,168],[19,168]], hi('lquad'));
      P([[48,124],[60,124],[61,168],[49,168]], hi('rquad'));
      E(rx(22,152,32,168), highlighted.has('lquad')?HI2:MID);
      E(rx(48,152,58,168), highlighted.has('rquad')?HI2:MID);
      fibers('lquad',[[[20,136],[31,136]],[[20,150],[31,150]],[[20,162],[31,162]]]);
      fibers('rquad',[[[49,136],[60,136]],[[49,150],[60,150]],[[49,162],[60,162]]]);

      P([[20,168],[31,168],[30,202],[21,202]], hi('lcalf'));
      P([[49,168],[61,168],[59,202],[50,202]], hi('rcalf'));
      fibers('lcalf',[[[21,178],[30,178]],[[21,190],[30,190]]]);
      fibers('rcalf',[[[50,178],[60,178]],[[50,190],[60,190]]]);

      boneLine([40,46],[40,90]);
      boneLine([40,46],[16,52]);
      boneLine([40,46],[64,52]);
      for (const yy of [56,65,74,83]){
        boneLine([30,yy],[40,yy-3]);
        boneLine([50,yy],[40,yy-3]);
      }
      boneLine([40,90],[40,124]);

      boneLine([49,168],[62,168]);
    }
  }

  /* ---------- barbell icon ---------- */
  function drawBarbell(ctx, cx, cy, s, color){
    const bw=Math.floor(44*s), bh=Math.floor(4*s);
    const pw=Math.floor(11*s), ph=Math.floor(28*s);
    const ow=Math.floor(8*s);
    ctx.fillStyle = color;
    ctx.fillRect(cx-bw, cy-bh, 2*bw, 2*bh);
    ctx.fillRect(cx-bw-pw, cy-ph, pw+1, 2*ph);
    ctx.fillRect(cx+bw-1, cy-ph, pw+1, 2*ph);
    ctx.fillRect(cx-bw-pw-ow, cy-ph+Math.floor(5*s), ow, 2*ph-2*Math.floor(5*s));
    ctx.fillRect(cx+bw+pw, cy-ph+Math.floor(5*s), ow, 2*ph-2*Math.floor(5*s));
  }

  /* ---------- delta arrow ---------- */
  function drawDeltaArrow(ctx, x, cy, arrowH, direction, color){
    const w = Math.floor(arrowH*0.75), h = arrowH;
    const cx = x + Math.floor(w/2);
    const top = cy - Math.floor(h/2), bot = cy + Math.floor(h/2);
    let pts;
    if (direction === 'up') pts = [[cx,top],[cx-Math.floor(w/2),bot],[cx+Math.floor(w/2),bot]];
    else pts = [[cx,bot],[cx-Math.floor(w/2),top],[cx+Math.floor(w/2),top]];
    polyFill(ctx, pts, color);
    return w;
  }

  /* ---------- data aggregation (port of the collection loop) ---------- */
  function aggregateWeek(data, mondayISO){
    const start = mondayOfWeek(parseISO(mondayISO));
    const days = [];
    for (let i=0;i<7;i++) days.push(addDays(start, i));

    const strengthCells = [], strengthPartsList = [], runCells = [];
    const dailyLoads = [], dailyDistances = [], bodyWeights = [];
    const daysBodyParts = [];
    let totalLoad = 0, totalDist = 0;

    for (const d of days){
      const ds = isoOf(d);
      const seen = new Set();
      const entries = [];
      for (const e of data){
        if (e.date !== ds) continue;
        const key = JSON.stringify([e.type, e.body_part, e.load, e.distance_km, e.pace_s_per_km, e.weight, e.reps, e.sets]);
        if (seen.has(key)) continue;
        seen.add(key);
        entries.push(e);
      }

      const strengthsByPart = new Map();
      for (const e of entries){
        if (e.type !== 'strength') continue;
        const bp = e.body_part || 'Unknown';
        let text;
        if (e.load !== null && e.load !== undefined){
          totalLoad += Number(e.load) || 0;
          text = `${fmtInt(e.load)} kg`;
        } else if (e.rpe !== null && e.rpe !== undefined){
          text = `RPE${e.rpe}`;
        } else {
          text = e.exercise || bp;
        }
        if (!strengthsByPart.has(bp)) strengthsByPart.set(bp, []);
        const lst = strengthsByPart.get(bp);
        if (!lst.includes(text)) lst.push(text);
      }

      const dayParts = [];
      let strengthCellText;
      if (strengthsByPart.size){
        const partsLines = [];
        for (const [bp, items] of strengthsByPart){
          const uniq = [...new Set(items)];
          const label = uniq.join(' / ');
          partsLines.push(`${bp}: ${label}`);
          const enBp = BP_MAP[bp] || bp;
          dayParts.push({ part: enBp, label });
        }
        strengthCellText = partsLines.join('\n');
      } else strengthCellText = '-';

      const runsList = [];
      const seenRuns = new Set();
      for (const e of entries){
        if (e.type !== 'run') continue;
        const dist = e.distance_km || 0;
        totalDist += Number(dist) || 0;
        let text;
        if (e.pace_s_per_km) text = `${dist} km  ${formatPace(Math.trunc(e.pace_s_per_km))}/km`;
        else text = `${dist} km`;
        if (!seenRuns.has(text)){ runsList.push(text); seenRuns.add(text); }
      }
      let runCellText = runsList.length ? runsList.join('; ') : '-';

      if (!strengthsByPart.size && !runsList.length){
        strengthCellText = 'Rest'; runCellText = 'Rest';
      } else {
        if (!strengthsByPart.size) strengthCellText = 'Rest';
        if (!runsList.length) runCellText = 'Rest';
      }

      strengthCells.push(strengthCellText);
      strengthPartsList.push(dayParts);
      runCells.push(runCellText);
      dailyLoads.push(entries.filter(e=>e.type==='strength').reduce((s,e)=>s+(Number(e.load)||0),0));
      dailyDistances.push(entries.filter(e=>e.type==='run').reduce((s,e)=>s+(Number(e.distance_km)||0),0));
      const bwEntry = entries.find(e=>e.type==='body_weight');
      bodyWeights.push(bwEntry ? bwEntry.weight_kg : null);

      // english body parts per day (silhouette) — from raw data like Python
      const parts = [];
      for (const e of data){
        if (e.date === ds && e.type === 'strength'){
          const en = BP_MAP[e.body_part || ''] || (e.body_part || '');
          if (en && !parts.includes(en)) parts.push(en);
        }
      }
      daysBodyParts.push(parts);
    }

    return { start, days, strengthCells, strengthPartsList, runCells,
             dailyLoads, dailyDistances, bodyWeights, daysBodyParts,
             totalLoad, totalDist };
  }

  // previous-week totals computed from stored data (for auto diff)
  function computeWeekTotals(data, mondayISO){
    const start = mondayOfWeek(parseISO(mondayISO));
    let load = 0, dist = 0, found = false;
    const dayset = new Set();
    for (let i=0;i<7;i++) dayset.add(isoOf(addDays(start,i)));
    // dedupe same way as aggregation
    const seen = new Set();
    for (const e of data){
      if (!dayset.has(e.date)) continue;
      const key = JSON.stringify([e.date, e.type, e.body_part, e.load, e.distance_km, e.pace_s_per_km, e.weight, e.reps, e.sets]);
      if (seen.has(key)) continue;
      seen.add(key);
      if (e.type === 'strength'){ load += Number(e.load)||0; found = true; }
      if (e.type === 'run'){ dist += Number(e.distance_km)||0; found = true; }
      if (e.type === 'body_weight') found = true;
    }
    return { load, dist, found };
  }

  /* ============================================================
   * MAIN RENDER
   * opts: { data, mondayISO, theme, lastWeekLoad, lastWeekDist,
   *         lastWeekSundayWeight, createCanvas, icons:{rest,runner},
   *         fontRegular, fontBold }
   * returns cropped canvas
   * ============================================================ */
  function renderWeekSummary(opts){
    const {
      data, mondayISO, createCanvas,
      icons = {}, fontRegular = 'CinzelR', fontBold = 'CinzelB',
    } = opts;
    const theme = THEMES[opts.theme] || THEMES.BLUE;
    const lastWeekLoad = opts.lastWeekLoad ?? null;
    const lastWeekDist = opts.lastWeekDist ?? null;
    const lastWeekSundayWeight = opts.lastWeekSundayWeight ?? null;

    const agg = aggregateWeek(data, mondayISO);
    const { start, days, strengthCells, strengthPartsList, runCells,
            dailyLoads, dailyDistances, bodyWeights, daysBodyParts,
            totalLoad, totalDist } = agg;

    const width = 1280;
    const height = Math.trunc(width * (19.5/9));   // 2773

    const ICE = theme.ICE, TEAL_HL = theme.TEAL_HL, WHITE = theme.WHITE, DIM = theme.DIM;

    const canvas = createCanvas(width, height);
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'alphabetic';
    const fk = makeFontKit(ctx, fontRegular, fontBold);

    /* --- Background: 4-corner bilinear gradient --- */
    {
      const gw = 64, gh = 139;
      const gc = createCanvas(gw, gh);
      const gctx = gc.getContext('2d');
      const id = gctx.createImageData(gw, gh);
      const [c00, c10, c01, c11] = theme.bg_corners; // PIL putdata order: (0,0),(1,0),(0,1),(1,1)
      for (let y=0;y<gh;y++){
        const v = y/(gh-1);
        for (let x=0;x<gw;x++){
          const u = x/(gw-1);
          const idx = (y*gw+x)*4;
          for (let k=0;k<3;k++){
            const top = c00[k]*(1-u) + c10[k]*u;
            const bot = c01[k]*(1-u) + c11[k]*u;
            id.data[idx+k] = Math.round(top*(1-v) + bot*v);
          }
          id.data[idx+3] = 255;
        }
      }
      gctx.putImageData(id, 0, 0);
      ctx.imageSmoothingEnabled = true;
      if ('imageSmoothingQuality' in ctx) ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(gc, 0, 0, width, height);
    }

    /* --- Decorative polygons --- */
    polyFill(ctx, [[Math.floor(width*0.52),0],[width,0],[width,Math.floor(height*0.32)]],
             rgba(theme.deco1, theme.deco1[3]/255));
    polyFill(ctx, [[Math.floor(width*0.74),0],[width,0],[width,Math.floor(height*0.14)]],
             rgba(theme.deco2, theme.deco2[3]/255));
    polyFill(ctx, [
      [Math.floor(width*0.78),Math.floor(height*0.18)],
      [width,Math.floor(height*0.12)],
      [width,Math.floor(height*0.44)],
      [Math.floor(width*0.73),Math.floor(height*0.40)]],
      rgba(theme.deco3, theme.deco3[3]/255));

    /* --- Glass blend helper --- */
    function blendRect(x,y,w,h,color,alpha){
      if (w<=0||h<=0) return;
      ctx.fillStyle = rgba(color, (alpha===undefined?170:alpha)/255);
      ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    }

    /* --- Layout constants --- */
    const PAD = 50, TITLE_H = 270;
    const TABLE_TOP = TITLE_H + PAD + 20;
    const TABLE_L = PAD, TABLE_R = width - PAD;
    const TABLE_W = TABLE_R - TABLE_L;
    const DAY_W = Math.trunc(TABLE_W * 0.185);
    const CONT_W = TABLE_W - DAY_W;
    const STR_W = Math.floor(CONT_W/2);
    const RUN_W = CONT_W - STR_W;
    const AVAIL_H = height - TABLE_TOP - PAD - 20;
    const CHART_H = 210, CHART_GAP = 24;
    const TABLE_AVAIL = AVAIL_H - CHART_H - CHART_GAP;
    const HDR_H = Math.trunc(TABLE_AVAIL * 0.095);
    const ROW_H = Math.max(80, Math.trunc((TABLE_AVAIL - HDR_H)/8));
    const TABLE_H = HDR_H + 8*ROW_H;
    const TABLE_BOT = TABLE_TOP + TABLE_H;
    const colX = [TABLE_L, TABLE_L+DAY_W, TABLE_L+DAY_W+STR_W];
    const colW = [DAY_W, STR_W, RUN_W];

    /* Glass panels */
    blendRect(TABLE_L-10, TABLE_TOP-10, TABLE_W+20, TABLE_H+20, theme.panel_bg, 192);
    blendRect(TABLE_L-10, PAD-10, TABLE_W+20, TITLE_H+10, theme.panel_title, 165);

    /* Title */
    {
      const sz=100;
      const t = 'TRAINING  LOG';
      const m = fk.measure(t, sz, true);
      fk.drawTL(t, Math.floor((width-m.w)/2), PAD+18, sz, true, rgb(ICE));
    }
    /* Week subtitle */
    {
      const wend = addDays(start, 6);
      const sub = `${MONTHS[start.m-1]} ${pad2(start.d)}  –  ${MONTHS[wend.m-1]} ${pad2(wend.d)},  ${wend.y}`;
      const sz=40;
      const m = fk.measure(sub, sz, false);
      fk.drawTL(sub, Math.floor((width-m.w)/2), PAD+158, sz, false, rgb(TEAL_HL));
    }
    /* Decorative rule */
    line(ctx, TABLE_L+80, TABLE_TOP-16, TABLE_R-80, TABLE_TOP-16, rgb(ICE), 2);

    /* --- pre-tinted icons --- */
    const restIconCache = new Map();
    function drawRestIcon(cx, cy, targetH){
      if (!icons.rest) return;
      let t = restIconCache.get(targetH);
      if (!t){ t = tintIcon(createCanvas, icons.rest, targetH, DIM); restIconCache.set(targetH, t); }
      if (t) ctx.drawImage(t, Math.floor(cx - t.width/2), Math.floor(cy - t.height/2));
    }
    function drawRunner(cx, cy, s){
      const iconH = Math.floor(120*s);
      if (icons.runner){
        const t = tintIcon(createCanvas, icons.runner, iconH, TEAL_HL);
        if (t){ ctx.drawImage(t, Math.floor(cx - t.width/2), Math.floor(cy - iconH/2)); return; }
      }
      // fallback stick figure
      const C = rgb(TEAL_HL);
      const lw = Math.max(3, Math.floor(7*s)), lw2 = Math.max(2, Math.floor(5*s));
      const hr = Math.max(3, Math.floor(10*s));
      const pt = (dx,dy)=>[Math.floor(cx+dx*s), Math.floor(cy+dy*s)];
      const ln = (a,b,w)=>{ const p=pt(a[0],a[1]), q=pt(b[0],b[1]); line(ctx,p[0],p[1],q[0],q[1],C,w||lw); };
      const hx = Math.floor(cx+5*s), hy = Math.floor(cy-58*s);
      ellipseFill(ctx, hx-hr, hy-hr, hx+hr, hy+hr, C);
      ln([3,-48],[-5,0]);
      ln([4,-42],[20,-18],lw2); ln([20,-18],[28,-38],lw2);
      ln([2,-42],[-14,-18],lw2); ln([-14,-18],[-20,-38],lw2);
      ln([-4,0],[14,14]); ln([14,14],[8,48]);
      ln([4,48],[16,48],lw2);
      ln([-4,0],[-18,18]); ln([-18,18],[-28,-4]);
      ln([-32,-4],[-22,-4],lw2);
    }

    /* ---- HEADER ROW ---- */
    const hdrY = TABLE_TOP;
    blendRect(TABLE_L, hdrY, TABLE_W, HDR_H, theme.panel_hdr, 220);
    for (let ci=0; ci<3; ci++)
      strokeRect(ctx, colX[ci], hdrY, colX[ci]+colW[ci], hdrY+HDR_H, rgb(ICE), 2);

    {
      const ft = fitText(fk, 'Day', colW[0]-8, HDR_H, 62, 16, true);
      drawCenter(fk, ft.lines, ft.size, true, colX[0]+Math.floor(colW[0]/2), hdrY+Math.floor(HDR_H/2), rgb(ICE));
    }
    const lblH = Math.floor(HDR_H*0.32);
    const icoZoneH = HDR_H - lblH - 8;

    // Strength header
    {
      const s = icoZoneH/185.0;
      drawBarbell(ctx, colX[1]+Math.floor(STR_W/2), hdrY + 6 + Math.floor(icoZoneH/2), s, rgb(TEAL_HL));
      const ft = fitText(fk, 'Strength', STR_W-16, lblH-6, 46, 14, true);
      const asc = fk.lineH(ft.size, true);
      let ty = hdrY + HDR_H - lblH + 4;
      for (const lnTxt of ft.lines){
        const w = fk.measure(lnTxt, ft.size, true).w;
        fk.drawTL(lnTxt, colX[1]+Math.floor(STR_W/2)-Math.floor(w/2), ty, ft.size, true, rgb(ICE));
        ty += asc + 4;
      }
    }
    // Running header
    {
      const s = icoZoneH/120.0;
      const rnCx = colX[2]+Math.floor(RUN_W/2);
      drawRunner(rnCx, hdrY + 6 + Math.floor(icoZoneH/2), s);
      const ft = fitText(fk, 'Running', RUN_W-16, lblH-6, 46, 14, true);
      const asc = fk.lineH(ft.size, true);
      let ty = hdrY + HDR_H - lblH + 4;
      for (const lnTxt of ft.lines){
        const w = fk.measure(lnTxt, ft.size, true).w;
        fk.drawTL(lnTxt, rnCx-Math.floor(w/2), ty, ft.size, true, rgb(ICE));
        ty += asc + 4;
      }
    }

    /* ---- DATA ROWS ---- */
    const FIG_AREA_W = Math.floor(STR_W*0.27);
    const RUN_ICO_W = Math.floor(RUN_W*0.20);

    for (let i=0;i<7;i++){
      const ry = TABLE_TOP + HDR_H + i*ROW_H;
      blendRect(TABLE_L, ry, TABLE_W, ROW_H, i%2===0?theme.row_even:theme.row_odd, 195);
      for (let ci=0;ci<3;ci++)
        strokeRect(ctx, colX[ci], ry, colX[ci]+colW[ci], ry+ROW_H, rgb(ICE), 1);

      // ----- Day cell -----
      const sec1 = Math.floor(ROW_H*0.40);
      const sec2 = Math.floor(ROW_H*0.24);
      const sec3 = ROW_H - sec1 - sec2;
      const PAD_X = 10;

      {
        const ft = fitText(fk, WEEKDAYS_EN[i], colW[0]-PAD_X*2, sec1-4, 64, 14, true);
        const wa = fk.lineH(ft.size, true);
        if (ft.lines.length)
          fk.drawTL(ft.lines[0], colX[0]+PAD_X, ry+Math.floor((sec1-wa)/2), ft.size, true, rgb(ICE));
      }
      {
        const ds = `${pad2(days[i].m)}/${pad2(days[i].d)}`;
        const ft = fitText(fk, ds, colW[0]-PAD_X*2, sec2-2, 38, 12, false);
        const da = fk.lineH(ft.size, false);
        fk.drawTL(ds, colX[0]+PAD_X, ry+sec1+Math.floor((sec2-da)/2), ft.size, false, 'rgb(155,135,75)');
      }

      const bw = bodyWeights[i];
      if (bw !== null && bw !== undefined){
        let prevBw;
        if (i > 0) prevBw = bodyWeights[i-1];
        else {
          const prevDay = isoOf(addDays(days[0], -1));
          const prevEntry = data.find(e=>e.date===prevDay && e.type==='body_weight');
          prevBw = prevEntry ? prevEntry.weight_kg : lastWeekSundayWeight;
        }
        const bwDelta = (prevBw !== null && prevBw !== undefined)
          ? Math.round((bw - prevBw)*100)/100 : null;

        const availW = colW[0]-PAD_X*2;
        const bwMain = `wt ${bw} kg`;
        const ftw = fitText(fk, bwMain, availW, sec3, 22, 8, false, 2);
        const bwa = fk.lineH(ftw.size, false);
        const bwY = ry + sec1 + sec2 + Math.max(0, Math.floor((sec3-bwa)/2));
        const bwCy = bwY + Math.floor(bwa/2);
        const mainBB = fk.drawTL(bwMain, colX[0]+PAD_X, bwY, ftw.size, false, 'rgb(180,210,255)');

        if (bwDelta !== null){
          const direction = bwDelta > 0 ? 'up' : 'down';
          const deltaClr = bwDelta > 0 ? 'rgb(255,100,80)' : 'rgb(80,220,140)';
          const arrH = Math.max(8, Math.floor(bwa*0.80));
          const arrX = mainBB.x2 + 5;
          const arrW = drawDeltaArrow(ctx, arrX, bwCy, arrH, direction, deltaClr);
          const dvalTxt = Math.abs(bwDelta).toFixed(1);
          const ftd = fitText(fk, dvalTxt, availW-(arrX-colX[0]-PAD_X)-arrW-2, sec3,
                              Math.floor(bwa*0.85), 7, false, 1);
          const dva = fk.lineH(ftd.size, false);
          fk.drawTL(dvalTxt, arrX+arrW+3, bwY+Math.floor((bwa-dva)/2), ftd.size, false, deltaClr);
        }
      }

      // ----- Strength cell -----
      const scRaw = strengthCells[i];
      const isRestS = scRaw === 'Rest';
      const bparts = daysBodyParts[i];
      const dayParts = strengthPartsList[i];

      let tx1, tw1;
      const hasFig = !isRestS && bparts.length > 0;
      if (hasFig){
        const figScale = (ROW_H-16)/202.0;
        const figW = Math.floor(80*figScale);
        const figOx = colX[1] + Math.floor((FIG_AREA_W-figW)/2);
        drawBodyFigure(ctx, figOx, ry+8, figScale, bparts);
        tx1 = colX[1] + FIG_AREA_W + 8;
        tw1 = STR_W - FIG_AREA_W - 16;
      } else {
        tx1 = colX[1] + 12;
        tw1 = STR_W - 24;
      }
      const rcRaw = runCells[i];
      const isRestR = rcRaw === 'Rest';

      if (isRestS){
        const iconHS = Math.floor(ROW_H*0.52);
        drawRestIcon(colX[1]+Math.floor(STR_W/2), ry+Math.floor(ROW_H/2)-Math.floor(iconHS/6), iconHS);
        const ft = fitText(fk, 'Rest', STR_W-16, Math.floor(ROW_H*0.28), 30, 10, false);
        drawCenter(fk, ft.lines, ft.size, false,
                   colX[1]+Math.floor(STR_W/2),
                   ry+Math.floor(ROW_H/2)+Math.floor(iconHS/2)-Math.floor(iconHS/8),
                   rgb(DIM));
      } else if (dayParts.length > 1){
        const partsTxt = dayParts.map(pd=>pd.part).join(' / ');
        const combined = `${partsTxt}\n${fmtInt(dailyLoads[i])} kg`;
        const ft = fitText(fk, combined, tw1, ROW_H-16, 42, 10, false);
        drawVCenter(fk, ft.lines, ft.size, false, tx1, ry+Math.floor(ROW_H/2), rgb(WHITE));
      } else {
        let scEn = scRaw;
        for (const [jp,en] of Object.entries(BP_MAP)) scEn = scEn.split(jp).join(en);
        const ft = fitText(fk, scEn, tw1, ROW_H-16, 55, 14, false);
        drawVCenter(fk, ft.lines, ft.size, false, tx1, ry+Math.floor(ROW_H/2), rgb(WHITE));
      }

      // ----- Running cell -----
      if (isRestR){
        const iconHR = Math.floor(ROW_H*0.52);
        drawRestIcon(colX[2]+Math.floor(RUN_W/2), ry+Math.floor(ROW_H/2)-Math.floor(iconHR/6), iconHR);
        const ft = fitText(fk, 'Rest', RUN_W-16, Math.floor(ROW_H*0.28), 30, 10, false);
        drawCenter(fk, ft.lines, ft.size, false,
                   colX[2]+Math.floor(RUN_W/2),
                   ry+Math.floor(ROW_H/2)+Math.floor(iconHR/2)-Math.floor(iconHR/8),
                   rgb(DIM));
      } else {
        const tx2 = colX[2] + RUN_ICO_W + 8;
        const tw2 = RUN_W - RUN_ICO_W - 16;
        const ft = fitText(fk, rcRaw, tw2, ROW_H-16, 62, 14, false);
        drawVCenter(fk, ft.lines, ft.size, false, tx2, ry+Math.floor(ROW_H/2), rgb(WHITE));
      }
    }

    /* ---- TOTALS ROW ---- */
    const totY = TABLE_TOP + HDR_H + 7*ROW_H;
    blendRect(TABLE_L, totY, TABLE_W, ROW_H, theme.row_tot, 220);
    for (let ci=0;ci<3;ci++)
      strokeRect(ctx, colX[ci], totY, colX[ci]+colW[ci], totY+ROW_H, rgb(ICE), 2);

    {
      const ft = fitText(fk, 'Total', colW[0]-8, ROW_H, 62, 16, true);
      drawCenter(fk, ft.lines, ft.size, true, colX[0]+Math.floor(colW[0]/2), totY+Math.floor(ROW_H/2), rgb(ICE));
    }

    function diffStr(current, last, unit, decimals){
      decimals = decimals || 0;
      if (last === null || last === undefined || last === 0) return '';
      const d = current - last;
      if (Number(Math.abs(d).toFixed(decimals)) === 0) return '  (=)';
      const mag = fmtFixed(Math.abs(d), decimals);
      return `  (${d >= 0 ? '+' : '-'}${mag}${unit})`;
    }

    {
      let sTot;
      if (totalLoad) sTot = `${fmtInt(totalLoad)} kg` + diffStr(totalLoad, lastWeekLoad, 'kg', 0);
      else sTot = '-';
      const ft = fitText(fk, sTot, STR_W-16, ROW_H-16, 52, 14, false);
      drawCenter(fk, ft.lines, ft.size, false, colX[1]+Math.floor(STR_W/2), totY+Math.floor(ROW_H/2), rgb(WHITE));
    }
    {
      let rTot;
      if (totalDist) rTot = `${totalDist.toFixed(1)} km` + diffStr(totalDist, lastWeekDist, 'km', 1);
      else rTot = '-';
      const ft = fitText(fk, rTot, RUN_W-16, ROW_H-16, 52, 14, false);
      drawCenter(fk, ft.lines, ft.size, false, colX[2]+Math.floor(RUN_W/2), totY+Math.floor(ROW_H/2), rgb(WHITE));
    }

    /* ---- TABLE BORDERS ---- */
    roundRectPath(ctx, TABLE_L-8, TABLE_TOP-8, TABLE_R+8, TABLE_BOT+8, 18);
    ctx.strokeStyle = rgb(ICE); ctx.lineWidth = 3; ctx.stroke();
    roundRectPath(ctx, TABLE_L+2, TABLE_TOP+2, TABLE_R-2, TABLE_BOT-2, 14);
    ctx.strokeStyle = rgb(halfC(ICE)); ctx.lineWidth = 1; ctx.stroke();

    /* ---- BAR CHART ---- */
    const cxTop = TABLE_BOT + CHART_GAP;
    const cxBot = cxTop + CHART_H;
    const cxL = TABLE_L, cxR = TABLE_R, cxW = cxR - cxL;

    blendRect(cxL-8, cxTop-8, cxW+16, CHART_H+16, theme.panel_bg, 185);
    roundRectPath(ctx, cxL-8, cxTop-8, cxR+8, cxBot+8, 14);
    ctx.strokeStyle = rgb(ICE); ctx.lineWidth = 2; ctx.stroke();

    const chLblH = 32, chTitleH = 32;
    const barAreaTop = cxTop + chTitleH + 4;
    const barAreaBot = cxBot - chLblH - 8;
    const barAreaH = barAreaBot - barAreaTop;
    const nDays = 7, Y_AXIS_W = 62;

    {
      const t = 'WEEKLY LOAD DISTRIBUTION';
      const m = fk.measure(t, 19, true);
      fk.drawTL(t, Math.floor((cxL+cxR-m.w)/2), cxTop+8, 19, true, rgb(ICE));
    }

    const barPlotL = cxL + Y_AXIS_W;
    const barPlotR = cxR - Y_AXIS_W;
    const barPlotW = barPlotR - barPlotL;
    const grpW = Math.floor(barPlotW/nDays);
    const barW = Math.floor(grpW*0.28);

    const maxLoad = dailyLoads.some(v=>v) ? Math.max(...dailyLoads) : 1;
    const maxDist = dailyDistances.some(v=>v) ? Math.max(...dailyDistances) : 1;

    const CLR_STR = TEAL_HL;
    const CLR_RUN = [Math.min(TEAL_HL[0]+60,255), Math.min(TEAL_HL[1]+40,255), Math.min(TEAL_HL[2]-30,255)];

    // Left y-axis (strength)
    const axisTicks = 3;
    line(ctx, barPlotL, barAreaTop, barPlotL, barAreaBot, rgb(CLR_STR), 2);
    for (let ti=0; ti<=axisTicks; ti++){
      const frac = ti/axisTicks;
      const ty = Math.floor(barAreaBot - frac*barAreaH);
      const tickVal = Math.trunc(maxLoad*frac);
      line(ctx, barPlotL-5, ty, barPlotL, ty, rgb(CLR_STR), 1);
      const lbl = ti===axisTicks ? `${fmtInt(tickVal)} kg` : fmtInt(tickVal);
      const m = fk.measure(lbl, 16, false);
      const labelY = Math.max(barAreaTop, ty - Math.floor(m.h/2));
      fk.drawTL(lbl, barPlotL-8-Math.floor(m.w), labelY, 16, false, rgb(CLR_STR));
    }
    // Right y-axis (run)
    line(ctx, barPlotR, barAreaTop, barPlotR, barAreaBot, rgb(CLR_RUN), 2);
    for (let ti=0; ti<=axisTicks; ti++){
      const frac = ti/axisTicks;
      const ty = Math.floor(barAreaBot - frac*barAreaH);
      const tickVal = maxDist*frac;
      line(ctx, barPlotR, ty, barPlotR+5, ty, rgb(CLR_RUN), 1);
      const lbl = ti===axisTicks ? `${tickVal.toFixed(1)} km` : tickVal.toFixed(1);
      const m = fk.measure(lbl, 16, false);
      fk.drawTL(lbl, barPlotR+8, ty-Math.floor(m.h/2), 16, false, rgb(CLR_RUN));
    }

    const grpCxs = [];
    for (let i=0;i<nDays;i++) grpCxs.push(barPlotL + grpW*i + Math.floor(grpW/2));
    const runPts = [];
    for (let i=0;i<nDays;i++){
      const rh = dailyDistances[i] > 0 ? Math.floor(barAreaH*(dailyDistances[i]/maxDist)) : 0;
      runPts.push([grpCxs[i], barAreaBot - rh, dailyDistances[i]]);
    }

    for (let i=0;i<nDays;i++){
      const grpCx = grpCxs[i];
      const bx = grpCx - Math.floor(barW/2);
      const lh = dailyLoads[i] ? Math.floor(barAreaH*(dailyLoads[i]/maxLoad)) : 0;
      const by = barAreaBot - lh;
      if (lh > 0){
        roundRectPath(ctx, bx, by, bx+barW, barAreaBot, 4);
        ctx.fillStyle = rgb(CLR_STR); ctx.fill();
        const val = fmtInt(dailyLoads[i]);
        const m = fk.measure(val, 17, false);
        let lblY = by - Math.floor(m.h) - 3;
        if (lblY < barAreaTop) lblY = by + 3;
        fk.drawTL(val, bx + Math.floor((barW-m.w)/2), lblY, 17, false, rgb(ICE));
      }
      const lb = WEEKDAYS_EN[i];
      const mlb = fk.measure(lb, 20, false);
      fk.drawTL(lb, grpCx - Math.floor(mlb.w/2), barAreaBot+6, 20, false, rgb(ICE));
    }

    // run line
    const LINE_W = 3, DOT_R = 7;
    for (let i=0;i<nDays-1;i++)
      line(ctx, runPts[i][0], runPts[i][1], runPts[i+1][0], runPts[i+1][1], rgb(CLR_RUN), LINE_W);
    for (const [pxv, pyv, dist] of runPts){
      ellipseFill(ctx, pxv-DOT_R, pyv-DOT_R, pxv+DOT_R, pyv+DOT_R, rgb(CLR_RUN));
      ellipseStroke(ctx, pxv-DOT_R, pyv-DOT_R, pxv+DOT_R, pyv+DOT_R, rgb(ICE), 1);
      const val = dist > 0 ? dist.toFixed(1) : '0';
      const m = fk.measure(val, 17, false);
      fk.drawTL(val, pxv+DOT_R+4, pyv-Math.floor(m.h/2), 17, false, rgb(CLR_RUN));
    }
    // baseline
    line(ctx, barPlotL, barAreaBot, barPlotR, barAreaBot, rgb(halfC(ICE)), 1);

    // legend
    {
      const legSz = 15;
      const swW=12, swH=11, gap=5, betweenGap=20;
      const legItems = [['strength (kg)', CLR_STR], ['run (km)', CLR_RUN]];
      const legY = cxTop + 10;
      let totalW = 0;
      for (const [lbl] of legItems) totalW += swW + gap + fk.measure(lbl, legSz, false).w + betweenGap;
      totalW -= betweenGap;
      let legX = barPlotR - totalW;
      legItems.forEach(([lbl, clr], idx)=>{
        const midY = legY + Math.floor(swH/2) + 2;
        if (idx===0){
          ctx.fillStyle = rgb(clr);
          ctx.fillRect(legX, legY+2, swW, swH);
        } else {
          line(ctx, legX, midY, legX+swW, midY, rgb(clr), 2);
          const r=4;
          ellipseFill(ctx, legX+Math.floor(swW/2)-r, midY-r, legX+Math.floor(swW/2)+r, midY+r, rgb(clr));
          ellipseStroke(ctx, legX+Math.floor(swW/2)-r, midY-r, legX+Math.floor(swW/2)+r, midY+r, rgb(ICE), 1);
        }
        fk.drawTL(lbl, legX+swW+gap, legY, legSz, false, rgb(ICE));
        legX += swW + gap + fk.measure(lbl, legSz, false).w + betweenGap;
      });
    }

    /* ---- CROP ---- */
    const mg = 36;
    const crop = { x: TABLE_L-mg, y: PAD-mg, w: (TABLE_R+mg)-(TABLE_L-mg), h: (cxBot+mg)-(PAD-mg) };
    const out = createCanvas(crop.w, crop.h);
    const octx = out.getContext('2d');
    octx.drawImage(canvas, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);
    return out;
  }

  return { renderWeekSummary, aggregateWeek, computeWeekTotals, THEMES, BP_MAP,
           mondayOfWeek, parseISO, isoOf, addDays, formatPace };
});

  ORANGE: {bgA:'#371606',bgB:'#b9550a',bgC:'#1e0a03',bgD:'#461e08',ice:'#ffecdc',hl:'#f58c37',panel:'#3c1a0a',row:'#4c2612'},
  PINK:   {bgA:'#340826',bgB:'#b91473',bgC:'#1c0414',bgD:'#440a30',ice:'#ffe2f2',hl:'#f55faa',panel:'#3a0a2a',row:'#4a1237'},
  MONO:   {bgA:'#181a1e',bgB:'#5f6673',bgC:'#0c0d10',bgD:'#22252a',ice:'#f0f4fa',hl:'#bec8d7',panel:'#1c1e24',row:'#262930'},
};

/* ============ constants / state ============ */
const LS_DATA = 'tls_data_v1';
const LS_PREF = 'tls_pref_v1';
const BODY_PARTS = ['胸','背中','肩','腕','脚'];
const WD_JP = ['月','火','水','木','金','土','日'];
const RC = window.RenderCore;

let data = [];
let pref = { theme:'RED', monday:null, autoLoad:true, autoDist:true, autoBw:true,
             lastLoad:null, lastDist:null, lastBw:null };
let icons = { rest:null, runner:null };
let fontsReady = false;
let renderTimer = null;
let lastCanvas = null;

/* ============ persistence ============ */
function loadState(){
  try{ const d = localStorage.getItem(LS_DATA); if (d) data = JSON.parse(d); }catch(e){ console.warn(e); }
  try{ const p = localStorage.getItem(LS_PREF); if (p) Object.assign(pref, JSON.parse(p)); }catch(e){ console.warn(e); }
  if (!pref.monday){
    const today = new Date();
    const iso = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    pref.monday = RC.isoOf(RC.mondayOfWeek(RC.parseISO(iso)));
  }
}
function saveData(){ localStorage.setItem(LS_DATA, JSON.stringify(data)); updateDataInfo(); }
function savePref(){ localStorage.setItem(LS_PREF, JSON.stringify(pref)); }

/* ============ helpers ============ */
const $ = id => document.getElementById(id);
function weekDates(){
  const start = RC.mondayOfWeek(RC.parseISO(pref.monday));
  const arr = [];
  for (let i=0;i<7;i++) arr.push(RC.isoOf(RC.addDays(start,i)));
  return arr;
}
function parsePaceInput(s){
  s = (s||'').trim();
  if (!s) return null;
  if (s.includes(':')){
    const [m,sec] = s.split(':',2).map(x=>parseInt(x,10));
    if (Number.isFinite(m) && Number.isFinite(sec)) return m*60+sec;
    return null;
  }
  const v = parseFloat(s);
  return Number.isFinite(v) ? Math.trunc(v) : null;
}
function paceToStr(p){ if (p===null||p===undefined) return ''; return RC.formatPace(Math.trunc(p)); }
function entriesFor(dateISO){
  const seen = new Set(); const out = [];
  for (const e of data){
    if (e.date !== dateISO) continue;
    const k = JSON.stringify([e.type,e.body_part,e.load,e.distance_km,e.pace_s_per_km,e.weight,e.reps,e.sets,e.weight_kg]);
    if (seen.has(k)) continue;
    seen.add(k); out.push(e);
  }
  return out;
}

/* ============ theme ============ */
function applyTheme(name){
  pref.theme = name; savePref();
  const t = APP_THEMES[name];
  const r = document.documentElement.style;
  r.setProperty('--bgA',t.bgA); r.setProperty('--bgB',t.bgB);
  r.setProperty('--bgC',t.bgC); r.setProperty('--bgD',t.bgD);
  r.setProperty('--ice',t.ice); r.setProperty('--hl',t.hl);
  r.setProperty('--panel',t.panel); r.setProperty('--row',t.row);
  document.querySelectorAll('.themes button').forEach(b=>
    b.classList.toggle('active', b.dataset.theme===name));
  scheduleRender();
}

/* ============ day cards UI ============ */
function buildDayCards(){
  const wrap = $('days');
  wrap.innerHTML = '';
  const dates = weekDates();
  dates.forEach((dISO, i)=>{
    const entries = entriesFor(dISO);
    const strengths = entries.filter(e=>e.type==='strength');
    const run = entries.find(e=>e.type==='run') || null;
    const bw = entries.find(e=>e.type==='body_weight') || null;

    const card = document.createElement('div');
    card.className = 'day';
    card.dataset.date = dISO;
    const [,m,d] = dISO.split('-');

    card.innerHTML = `
      <div class="dayhead">
        <span class="dname">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i]}</span>
        <span class="ddate">${m}/${d}</span>
        <span class="restmark">(${WD_JP[i]})</span>
      </div>
      <div class="fieldrow"><span class="lbl">筋トレ</span>
        <span class="hint" style="margin:0">未入力＝休み</span></div>
      <div class="slist"></div>
      <button class="addbtn" type="button">＋ 部位を追加</button>
      <div class="fieldrow"><span class="lbl">ラン</span>
        <input type="number" class="runDist" step="0.01" min="0" placeholder="距離" value="${run && run.distance_km!=null ? run.distance_km : ''}">
        <span class="unit">km</span>
        <input type="text" class="runPace" style="width:80px" placeholder="5:12" value="${run ? paceToStr(run.pace_s_per_km) : ''}">
        <span class="unit">/km</span>
      </div>
      <div class="fieldrow"><span class="lbl">体重</span>
        <input type="number" class="bwKg" step="0.05" min="0" placeholder="—" value="${bw && bw.weight_kg!=null ? bw.weight_kg : ''}">
        <span class="unit">kg</span>
      </div>`;

    const slist = card.querySelector('.slist');
    const addRow = (bp, load)=>{
      const row = document.createElement('div');
      row.className = 'srow';
      const opts = BODY_PARTS.slice();
      if (bp && !opts.includes(bp)) opts.push(bp);
      row.innerHTML = `
        <select class="sPart">${opts.map(o=>`<option${o===bp?' selected':''}>${o}</option>`).join('')}</select>
        <input type="number" class="sLoad" step="1" min="0" placeholder="負荷" value="${load!=null?load:''}">
        <span class="unit">kg</span>
        <button class="icon delRow" type="button" title="削除">✕</button>`;
      row.querySelector('.delRow').addEventListener('click', ()=>{ row.remove(); onFormChange(card); });
      slist.appendChild(row);
    };
    strengths.forEach(s=>addRow(s.body_part, s.load));
    card.querySelector('.addbtn').addEventListener('click', ()=>{ addRow(BODY_PARTS[0], null); onFormChange(card); });
    card.addEventListener('input', ()=>onFormChange(card));
    card.addEventListener('change', ()=>onFormChange(card));
    wrap.appendChild(card);
  });
}

/* form → data (rebuild the 3 managed types for that date) */
function onFormChange(card){
  const dISO = card.dataset.date;
  data = data.filter(e => !(e.date === dISO && ['strength','run','body_weight'].includes(e.type)));
  card.querySelectorAll('.srow').forEach(row=>{
    const bp = row.querySelector('.sPart').value;
    const load = parseFloat(row.querySelector('.sLoad').value);
    if (Number.isFinite(load) && load > 0)
      data.push({ date:dISO, type:'strength', body_part:bp, load });
  });
  const dist = parseFloat(card.querySelector('.runDist').value);
  if (Number.isFinite(dist) && dist > 0){
    const pace = parsePaceInput(card.querySelector('.runPace').value);
    const e = { date:dISO, type:'run', distance_km:dist };
    e.pace_s_per_km = pace; // null ok（Pythonと同じ）
    data.push(e);
  }
  const bw = parseFloat(card.querySelector('.bwKg').value);
  if (Number.isFinite(bw) && bw > 0)
    data.push({ date:dISO, type:'body_weight', weight_kg:bw });
  saveData();
  refreshAutoDiff();
  scheduleRender();
}

/* ============ diff panel ============ */
function refreshAutoDiff(){
  const prevMonday = RC.isoOf(RC.addDays(RC.mondayOfWeek(RC.parseISO(pref.monday)), -7));
  const tot = RC.computeWeekTotals(data, prevMonday);
  if (pref.autoLoad){ $('lastLoad').value = tot.found && tot.load ? Math.round(tot.load) : ''; }
  if (pref.autoDist){ $('lastDist').value = tot.found && tot.dist ? tot.dist.toFixed(1) : ''; }
  // previous Sunday body weight
  const prevSun = RC.isoOf(RC.addDays(RC.mondayOfWeek(RC.parseISO(pref.monday)), -1));
  const e = data.find(x=>x.date===prevSun && x.type==='body_weight');
  if (pref.autoBw){ $('lastBw').value = e ? e.weight_kg : ''; }
  $('lastLoad').disabled = pref.autoLoad;
  $('lastDist').disabled = pref.autoDist;
  $('lastBw').disabled = pref.autoBw;
}
function currentDiffValues(){
  const num = v => { const f = parseFloat(v); return Number.isFinite(f) ? f : null; };
  return {
    lastLoad: num($('lastLoad').value),
    lastDist: num($('lastDist').value),
    lastBw:   num($('lastBw').value),
  };
}

/* ============ week navigation ============ */
function setWeek(mondayISO){
  pref.monday = mondayISO; savePref();
  $('weekDate').value = mondayISO;
  const start = RC.mondayOfWeek(RC.parseISO(mondayISO));
  const end = RC.addDays(start, 6);
  $('weekRange').textContent =
    `${RC.isoOf(start).replaceAll('-','/')} (Mon) 〜 ${RC.isoOf(end).replaceAll('-','/')} (Sun)`;
  buildDayCards();
  refreshAutoDiff();
  scheduleRender();
}

/* ============ render ============ */
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderPreview, 250);
}
function renderPreview(){
  if (!fontsReady) return;
  try{
    const diff = currentDiffValues();
    const out = RC.renderWeekSummary({
      data,
      mondayISO: pref.monday,
      theme: pref.theme,
      lastWeekLoad: diff.lastLoad,
      lastWeekDist: diff.lastDist,
      lastWeekSundayWeight: diff.lastBw,
      createCanvas: (w,h)=>{ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; },
      icons,
      fontRegular:'CinzelR', fontBold:'CinzelB',
    });
    lastCanvas = out;
    const pv = $('preview');
    pv.width = out.width; pv.height = out.height;
    pv.getContext('2d').drawImage(out, 0, 0);
    $('status').textContent = '';
  }catch(err){
    console.error(err);
    $('status').textContent = '描画エラー: ' + err.message;
  }
}

/* ============ save / io ============ */
function savePng(){
  if (!lastCanvas){ renderPreview(); if (!lastCanvas) return; }
  const start = RC.mondayOfWeek(RC.parseISO(pref.monday));
  const end = RC.addDays(start, 6);
  const name = start.m === end.m
    ? `${start.m}-${start.d}~${end.d}.png`
    : `${start.m}-${start.d}~${end.m}-${end.d}.png`;
  lastCanvas.toBlob(blob=>{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }, 'image/png');
}
function exportJson(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'workout_data.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}
function importJson(file){
  const rd = new FileReader();
  rd.onload = ()=>{
    try{
      const arr = JSON.parse(rd.result);
      if (!Array.isArray(arr)) throw new Error('配列形式のJSONではありません');
      const mode = confirm('OK: 既存データに追記（マージ）\nキャンセル: 置き換え');
      data = mode ? data.concat(arr) : arr;
      saveData();
      buildDayCards();
      refreshAutoDiff();
      scheduleRender();
    }catch(e){ alert('読み込み失敗: ' + e.message); }
  };
  rd.readAsText(file);
}
function updateDataInfo(){
  $('dataInfo').textContent = `保存済みエントリ: ${data.length}件（このブラウザのlocalStorageに保存されます）`;
}

/* ============ boot ============ */
async function boot(){
  loadState();

  // fonts
  function b64ToBuf(b64){
    const bin = atob(b64); const buf = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }
  try{
    const fR = new FontFace('CinzelR', b64ToBuf(FONT_R_B64));
    const fB = new FontFace('CinzelB', b64ToBuf(FONT_B_B64));
    await Promise.all([fR.load(), fB.load()]);
    document.fonts.add(fR); document.fonts.add(fB);
  }catch(e){ console.warn('font load failed', e); }
  fontsReady = true;

  // icons
  const loadImg = url => new Promise(res=>{
    const im = new Image();
    im.onload = ()=>res(im);
    im.onerror = ()=>res(null);
    im.src = url;
  });
  [icons.rest, icons.runner] = await Promise.all([loadImg(ICON_REST_URL), loadImg(ICON_RUN_URL)]);

  // wire UI
  document.querySelectorAll('.themes button').forEach(b=>
    b.addEventListener('click', ()=>applyTheme(b.dataset.theme)));
  $('weekDate').addEventListener('change', ()=>{
    const v = $('weekDate').value;
    if (v) setWeek(RC.isoOf(RC.mondayOfWeek(RC.parseISO(v))));
  });
  $('prevWeek').addEventListener('click', ()=>setWeek(RC.isoOf(RC.addDays(RC.parseISO(pref.monday), -7))));
  $('nextWeek').addEventListener('click', ()=>setWeek(RC.isoOf(RC.addDays(RC.parseISO(pref.monday), 7))));
  $('thisWeek').addEventListener('click', ()=>{
    const t = new Date();
    const iso = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    setWeek(RC.isoOf(RC.mondayOfWeek(RC.parseISO(iso))));
  });
  for (const [id,key] of [['autoLoad','autoLoad'],['autoDist','autoDist'],['autoBw','autoBw']]){
    $(id).checked = pref[key];
    $(id).addEventListener('change', ()=>{
      pref[key] = $(id).checked; savePref();
      refreshAutoDiff(); scheduleRender();
    });
  }
  ['lastLoad','lastDist','lastBw'].forEach(id=>
    $(id).addEventListener('input', scheduleRender));
  $('savePng').addEventListener('click', savePng);
  $('exportJson').addEventListener('click', exportJson);
  $('importJson').addEventListener('click', ()=>$('importFile').click());
  $('importFile').addEventListener('change', e=>{
    if (e.target.files[0]) importJson(e.target.files[0]);
    e.target.value = '';
  });
  $('clearAll').addEventListener('click', ()=>{
    if (confirm('保存済みの全トレーニングデータを削除します。よろしいですか？\n（先にJSONエクスポートでバックアップすることをおすすめします）')){
      data = []; saveData();
      buildDayCards(); refreshAutoDiff(); scheduleRender();
    }
  });

  applyTheme(pref.theme);
  updateDataInfo();
  setWeek(pref.monday);
}
boot();
</script>
</body>
